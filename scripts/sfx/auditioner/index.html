<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SFX + Music Auditioner — SSL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Aligned to Loop Cutter (claude-remotion-flow brand). */
    --ss-purple: #461499;
    --ss-purple-light: #753EF7;
    --ss-purple-glow: #9B6DFF;
    --ss-deep: #0C0322;
    --ss-deep-2: #130d2a;
    --ss-card: #1a1a2e;
    --ss-hover: #252040;
    --ss-gold: #FBBF24;

    --bg: var(--ss-deep);
    --panel: var(--ss-deep-2);
    --panel-2: var(--ss-card);
    --ink: #FAFAFC;
    --ink-muted: #B8B0D8;
    --line: #2a1f4d;
    --accent: var(--ss-gold);
    --star: var(--ss-gold);
    --chip-bg: var(--ss-card);
    --chip-on: var(--ss-gold);
    --chip-on-ink: var(--ss-deep);
    --copy: var(--ss-purple-light);
    --radius: 8px;
    --font: "Plus Jakarta Sans", "Inter", -apple-system, system-ui, sans-serif;
    /* Traktor-style categorical stripe — one hue per top-level category. 4px left edge. */
    --cat-transitions: #22D3EE;
    --cat-stingers:    #F59E0B;
    --cat-risers:      #EC4899;
    --cat-impacts:     #EF4444;
    --cat-ambience:    #94A3B8;
    --cat-music:       var(--ss-gold);
    --cat-fallback:    var(--ss-purple-light);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--font); font-size: 13px; line-height: 1.4; }
  /* F7: narrow row grid + align header/tray content to the same 1080px column.
     Backgrounds still full-bleed (header/tray bars span the viewport); inner
     content is centered in a .bar-inner wrapper that mirrors the row width. */
  .content { max-width: 1080px; margin: 0 auto; padding: 0 16px; }
  .bar-inner { max-width: 1080px; margin: 0 auto; padding: 0 16px; }
  /* Outer bars: keep vertical padding only, hand horizontal to .bar-inner. */
  header { padding: 14px 0; }
  .tray { padding: 8px 0; display: block; font-size: 12px; }
  .tray .bar-inner { display: flex; gap: 10px; align-items: center; }
  header { position: sticky; top: 0; z-index: 10; background: var(--panel); border-bottom: 1px solid var(--line); padding: 14px 20px; }
  /* F3: brand-glow on the title — matches the cutter's gradient logo text so the two views read as one product. */
  header h1 { margin: 0 0 4px; font-size: 18px; font-weight: 700; letter-spacing: -0.01em;
    background: linear-gradient(135deg, #FAFAFC 0%, var(--ss-purple-glow) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 14px rgba(117, 62, 247, 0.32));
  }
  /* save-indicator is a child <span> — opt back out of the gradient so its status text stays legible. */
  header h1 .save-indicator { background: none; -webkit-text-fill-color: var(--ink-muted); color: var(--ink-muted); filter: none; }
  header .meta { color: var(--ink-muted); font-size: 12px; }
  .tabs { display: flex; gap: 4px; margin: 10px 0 0; flex-wrap: wrap; }
  .tab { background: var(--panel-2); border: 1px solid var(--line); border-radius: var(--radius); padding: 6px 12px; color: var(--ink-muted); cursor: pointer; font-size: 12px; font-weight: 500; }
  .tab.on { background: var(--accent); color: var(--chip-on-ink); border-color: var(--accent); }
  .tab .count { opacity: 0.65; margin-left: 6px; font-weight: 400; }
  .tab.on .count { opacity: 0.85; }
  .filters { display: flex; gap: 12px; margin: 12px 0 0; flex-wrap: wrap; align-items: center; }
  .filter-group { display: flex; gap: 4px; align-items: center; }
  .filter-group label { color: var(--ink-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; margin-right: 4px; }
  .chip { background: var(--chip-bg); border: 1px solid var(--line); border-radius: 999px; padding: 3px 10px; color: var(--ink); cursor: pointer; font-size: 11px; }
  .chip.on { background: var(--chip-on); color: var(--chip-on-ink); border-color: var(--chip-on); }
  .tray { position: sticky; top: 0; z-index: 9; background: var(--panel-2); border-bottom: 1px solid var(--line); padding: 8px 20px; display: flex; gap: 10px; align-items: center; font-size: 12px; }
  .tray.empty { opacity: 0.55; }
  .tray .count-pill { background: var(--accent); color: var(--chip-on-ink); border-radius: 999px; padding: 2px 10px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .tray button { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); color: var(--ink); padding: 4px 10px; font-size: 12px; cursor: pointer; }
  .tray button:hover:not(:disabled) { background: var(--chip-bg); }
  .tray button:disabled { opacity: 0.4; cursor: not-allowed; }
  .tray button.primary { background: var(--accent); border-color: var(--accent); color: var(--chip-on-ink); font-weight: 500; }
  .content { padding: 14px 20px 60px; }
  .sub-heading { font-size: 11px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.06em; margin: 16px 0 6px; padding: 0 10px; }
  .row { display: grid; grid-template-columns: 4px 26px 22px 1fr 32px 48px 48px 34px 34px; gap: 10px; align-items: center; padding: 8px 10px 8px 0; min-height: 56px; border-bottom: 1px solid var(--line); position: relative; cursor: default; }
  .row.playing { background: rgba(117, 62, 247, 0.06); }
  .row.playing .stripe { opacity: 1; box-shadow: 0 0 12px currentColor; }
  /* Play toggle in the row — drives the global preview bar. Single source of
     audition; per-row audio elements are gone. */
  button.play-toggle { background: transparent; border: 1px solid var(--line); border-radius: 999px; color: var(--ink-muted); width: 30px; height: 30px; cursor: pointer; font-size: 13px; line-height: 1; padding: 0; display: flex; align-items: center; justify-content: center; }
  button.play-toggle:hover { background: var(--panel-2); color: var(--ink); border-color: var(--ss-purple-light); }
  .row.playing button.play-toggle { background: var(--ss-purple-light); color: white; border-color: var(--ss-purple-light); }
  /* Categorical stripe: 4px inline column tinted per data-category. Default is fallback purple. */
  .row .stripe { width: 4px; align-self: stretch; background: var(--cat-fallback); border-radius: 0 2px 2px 0; opacity: 0.8; }
  .row[data-category="transitions"] .stripe { background: var(--cat-transitions); }
  .row[data-category="stingers"]    .stripe { background: var(--cat-stingers); }
  .row[data-category="risers"]      .stripe { background: var(--cat-risers); }
  .row[data-category="impacts"]     .stripe { background: var(--cat-impacts); }
  .row[data-category="ambience"]    .stripe { background: var(--cat-ambience); }
  .row[data-category="music"]       .stripe { background: var(--cat-music); }
  .row.shortlisted { background: rgba(255, 177, 29, 0.06); }
  .row.selected .stripe { opacity: 1; box-shadow: 0 0 8px currentColor; }
  .row .sel { width: 14px; height: 14px; accent-color: var(--copy); cursor: pointer; margin: 0; }
  .idx { color: var(--ink-muted); font-variant-numeric: tabular-nums; font-size: 11px; text-align: right; }
  .meta-cell { display: flex; flex-direction: column; min-width: 0; }
  /* Type ramp from F9 moodboard:
     title 14/600 · sub 12/400 · tabular 12/500. Apple Music + Traktor have
     this same hierarchy — title carries weight, sub stays out of the way. */
  .title { font-size: 14px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.25; }
  .sub { color: var(--ink-muted); font-size: 12px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  /* Force native light controls so the player chrome reads white, not dark/purple. */
  audio { width: 100%; height: 32px; color-scheme: light; }
  .duration { font-variant-numeric: tabular-nums; color: var(--ink-muted); font-size: 12px; text-align: right; }
  /* BPM column — Traktor pattern. Most rows are null (SFX has no tempo);
     show em-dash dimmed so the column reads at a glance for music rows
     without shouting on the others. */
  .bpm { font-variant-numeric: tabular-nums; color: var(--ink-muted); font-size: 12px; text-align: right; font-weight: 500; }
  .bpm.null { opacity: 0.4; font-weight: 400; }
  button.act { background: transparent; border: 1px solid var(--line); border-radius: var(--radius); color: var(--ink-muted); width: 32px; height: 28px; cursor: pointer; font-size: 14px; line-height: 1; padding: 0; transition: opacity 120ms ease; }
  button.act:hover { background: var(--panel-2); color: var(--ink); }
  button.act.star.on { background: var(--star); border-color: var(--star); color: var(--chip-on-ink); }
  button.act.copy:hover { color: var(--copy); border-color: var(--copy); }
  button.act.copy.flash { background: var(--copy); color: white; border-color: var(--copy); }
  button.act.cut:hover { color: var(--accent); border-color: var(--accent); }
  button.act.overflow:hover { color: var(--ink); border-color: var(--line); }
  /* Apple Music pattern: star + overflow are always visible (bookmarks/menu).
     Copy + scissor (and any future utility action) reveal on row hover or
     keyboard focus. Keeps the row reading clean by default. */
  .row .act:not(.star):not(.overflow) { opacity: 0; }
  .row:hover .act, .row:focus-within .act, .row.overflow-open .act { opacity: 1; }
  /* Overflow menu — Apple Music's "…" relief valve. Houses scissor + path-copy
     variants so the row trailing edge stays at two visible buttons. */
  .row .overflow-menu {
    position: absolute; top: calc(100% - 4px); right: 8px; z-index: 20;
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 4px 0; display: none; min-width: 240px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .row.overflow-open .overflow-menu { display: block; }
  .row .overflow-menu button {
    display: block; width: 100%; text-align: left; background: transparent; border: 0;
    color: var(--ink); padding: 8px 14px; font-size: 12px; font-family: var(--font);
    cursor: pointer; line-height: 1.3;
  }
  .row .overflow-menu button:hover { background: var(--ss-hover); }
  .row .overflow-menu .menu-sub { color: var(--ink-muted); font-size: 10px; margin-top: 1px; }
  .empty { padding: 80px 20px; text-align: center; color: var(--ink-muted); }
  .note { grid-column: 4 / -1; margin-top: 2px; }
  .note input { width: 100%; background: var(--panel-2); border: 1px solid var(--line); border-radius: 4px; color: var(--ink); padding: 4px 8px; font-size: 11px; font-family: var(--font); }
  .note input:focus { outline: none; border-color: var(--accent); }
  .save-indicator { font-size: 11px; color: var(--ink-muted); margin-left: 8px; }
  .save-indicator.saving { color: var(--accent); }
  .save-indicator.saved { color: #1fbf5b; }
  .save-indicator.error { color: #e5484d; }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .modal { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 16px; max-width: 90%; width: 600px; }
  .modal h3 { margin: 0 0 8px; font-size: 13px; }
  .modal textarea { width: 100%; min-height: 160px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 4px; color: var(--ink); padding: 8px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
  .modal .close-row { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
  @media (max-width: 900px) {
    .row { grid-template-columns: 4px 20px 1fr 32px 34px 34px; gap: 8px; min-height: 48px; }
    .idx { display: none; }
    .meta-cell { grid-column: span 1; }
    .duration, .bpm { display: none; }
  }
  /* Global preview bar — sticky at the viewport bottom, shows the loaded track
     and the native audio scrubber. Replaces 89× per-row audio walls (F9 spec).
     Hidden until a row is played. */
  .preview-bar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
    background: var(--panel); border-top: 1px solid var(--line);
    padding: 10px 0; box-shadow: 0 -8px 24px rgba(0,0,0,0.3);
    transform: translateY(100%); transition: transform 200ms ease; }
  .preview-bar.on { transform: translateY(0); }
  .preview-bar .bar-inner { display: grid; grid-template-columns: 1fr 1.4fr auto; gap: 16px; align-items: center; }
  .preview-bar .pb-meta { min-width: 0; display: flex; flex-direction: column; }
  .preview-bar .pb-title { font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .preview-bar .pb-sub { font-size: 11px; color: var(--ink-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .preview-bar audio { width: 100%; height: 32px; color-scheme: light; }
  .preview-bar .pb-actions { display: flex; gap: 8px; }
  .preview-bar .pb-actions button { background: transparent; border: 1px solid var(--line); border-radius: var(--radius); color: var(--ink); padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: var(--font); }
  .preview-bar .pb-actions button:hover { background: var(--panel-2); border-color: var(--ss-purple-light); }
  .preview-bar .pb-actions .pb-cutter { background: var(--accent); color: var(--chip-on-ink); border-color: var(--accent); font-weight: 500; }
  .preview-bar .pb-actions .pb-cutter:hover { background: var(--accent); border-color: var(--accent); filter: brightness(1.1); }
  .content { padding-bottom: 100px; }
</style>
</head>
<body>
<header>
  <div class="bar-inner">
    <h1>SFX + Music Auditioner <span class="save-indicator" id="saveIndicator"></span></h1>
    <div class="meta" id="meta">loading…</div>
    <div class="tabs" id="tabs"></div>
    <div class="filters">
      <div class="filter-group">
        <label>Show</label>
        <button class="chip on" data-status="all">all</button>
        <button class="chip" data-status="shortlisted">⭐ shortlisted</button>
        <button class="chip" data-status="unshortlisted">unshortlisted</button>
      </div>
      <div class="filter-group">
        <label>Duration</label>
        <button class="chip on" data-dur="all">any</button>
        <button class="chip" data-dur="short">≤ 3s</button>
        <button class="chip" data-dur="mid">3–15s</button>
        <button class="chip" data-dur="long">15s+</button>
      </div>
      <div class="filter-group">
        <label>Search</label>
        <input id="search" type="search" placeholder="title, author, tag" style="background:var(--panel-2);border:1px solid var(--line);border-radius:4px;color:var(--ink);padding:4px 8px;font-size:12px;min-width:180px;">
      </div>
    </div>
  </div>
</header>
<div class="tray empty" id="tray">
  <div class="bar-inner">
    <span class="count-pill" id="trayCount">0</span>
    <span id="trayLabel">nothing selected — tick boxes to stage for copy</span>
    <button id="trayClear">Clear</button>
    <button id="trayCopy" class="primary">Copy selection</button>
    <button id="trayPromote">Promote to ⭐ shortlist</button>
  </div>
</div>
<main class="content" id="content">
  <div class="empty">loading manifest…</div>
</main>
<footer class="preview-bar" id="previewBar">
  <div class="bar-inner">
    <div class="pb-meta">
      <div class="pb-title" id="pbTitle">—</div>
      <div class="pb-sub" id="pbSub">no track loaded</div>
    </div>
    <audio id="pbAudio" controls preload="none"></audio>
    <div class="pb-actions">
      <button id="pbCutter" class="pb-cutter" title="Open this track in Loop Cutter">✂︎ Cutter</button>
      <button id="pbCopy" title="Copy path to current track">📋 Copy</button>
    </div>
  </div>
</footer>
<script>
// ── State ──────────────────────────────────────────────────────
const SELECTION_KEY = 'sfx-auditioner-selection-v1';
const state = {
  manifest: null,
  byCat: new Map(),
  activeCat: null,
  filter: { status: 'all', dur: 'all', search: '' },
  pending: new Map(),
  selection: new Set(loadSelection()),
  nowPlayingId: null,
};

function loadSelection() {
  try { return JSON.parse(localStorage.getItem(SELECTION_KEY) || '[]'); } catch { return []; }
}
function saveSelection() {
  localStorage.setItem(SELECTION_KEY, JSON.stringify([...state.selection]));
}

// ── Helpers ────────────────────────────────────────────────────
function durationSeconds(s) {
  if (!s) return 0;
  const m = String(s).match(/(\d+):(\d{2})/);
  return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : 0;
}
function durationBucket(s) {
  const sec = durationSeconds(s);
  if (sec <= 3) return 'short';
  if (sec <= 15) return 'mid';
  return 'long';
}
function matchesFilter(item) {
  const st = state.filter.status;
  if (st === 'shortlisted' && !item.shortlisted) return false;
  if (st === 'unshortlisted' && item.shortlisted) return false;
  const d = state.filter.dur;
  if (d !== 'all' && durationBucket(item.duration) !== d) return false;
  const q = state.filter.search.trim().toLowerCase();
  if (q) {
    const hay = `${item.title || ''} ${item.author || ''} ${(item.tags || []).join(' ')}`.toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]); }

// Path strings used by the UI.
//   item.local_path is e.g. "public/assets/sfx/library/transitions/<file>.mp3"
//                   or     "public/assets/music/ssl-live-beds/<file>.mp3"
// Remotion consumes the prefix after "public/" via staticFile().
function relFromPublic(item) {
  return (item.local_path || '').replace(/^public\//, '');
}
function audioUrl(item) {
  // Server mounts /audio/<rel> under public/assets/; strip that prefix + url-encode each segment.
  const rel = (item.local_path || '').replace(/^public\/assets\//, '');
  return '/audio/' + rel.split('/').map(encodeURIComponent).join('/');
}
function barePath(item) { return relFromPublic(item); }
function wrappedPath(item) { return `staticFile("${relFromPublic(item)}")`; }

// ── Clipboard ──────────────────────────────────────────────────
async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && window.isSecureContext !== false) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch (e) { /* fall through */ }
  showClipboardModal(text);
  return false;
}
function showClipboardModal(text) {
  const back = document.createElement('div');
  back.className = 'modal-backdrop';
  back.innerHTML = `
    <div class="modal">
      <h3>Copy manually — clipboard not available</h3>
      <textarea readonly></textarea>
      <div class="close-row"><button>Close</button></div>
    </div>`;
  const ta = back.querySelector('textarea');
  ta.value = text;
  back.querySelector('button').onclick = () => back.remove();
  back.onclick = (e) => { if (e.target === back) back.remove(); };
  document.body.appendChild(back);
  ta.focus();
  ta.select();
}
function flashButton(btn) {
  btn.classList.add('flash');
  setTimeout(() => btn.classList.remove('flash'), 600);
}

// ── Save — debounced PATCH ─────────────────────────────────────
function scheduleSave(item, patch) {
  Object.assign(item, patch);
  setIndicator('saving');
  if (state.pending.has(item.id)) clearTimeout(state.pending.get(item.id));
  const t = setTimeout(async () => {
    try {
      const res = await fetch(`/api/item/${encodeURIComponent(item.id)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(patch),
      });
      if (!res.ok) throw new Error('PATCH ' + res.status);
      setIndicator('saved');
    } catch (e) {
      console.error(e); setIndicator('error: ' + e.message, true);
    }
    state.pending.delete(item.id);
  }, 250);
  state.pending.set(item.id, t);
}
function setIndicator(text, isError = false) {
  const el = document.getElementById('saveIndicator');
  el.textContent = text;
  el.className = 'save-indicator ' + (isError ? 'error' : (text === 'saved' ? 'saved' : text ? 'saving' : ''));
  if (!isError && text === 'saved') setTimeout(() => { el.textContent = ''; el.className = 'save-indicator'; }, 1000);
}

// ── Global preview bar — single audio for the whole list ───────
// Replaces 89× per-row <audio> elements. The play toggle on each row
// loads its src into this bar and starts playback. Track state is
// kept in state.nowPlayingId so we can toggle play/pause on a re-click.
const previewBar = {
  el: () => document.getElementById('previewBar'),
  audio: () => document.getElementById('pbAudio'),
  title: () => document.getElementById('pbTitle'),
  sub: () => document.getElementById('pbSub'),
  cutter: () => document.getElementById('pbCutter'),
  copy: () => document.getElementById('pbCopy'),
};
function loadPreview(item) {
  const audio = previewBar.audio();
  const url = audioUrl(item);
  audio.src = url;
  previewBar.title().textContent = item.title || '—';
  previewBar.sub().textContent = `${item.author || '—'} · ${item.category || ''}` + (item.bpm ? ` · ${item.bpm} BPM` : '');
  previewBar.el().classList.add('on');
  state.nowPlayingId = item.id;
  // Re-skin all play toggles so the active row pulses.
  document.querySelectorAll('.row.playing').forEach(r => r.classList.remove('playing'));
  document.querySelectorAll('.row .play-toggle').forEach(b => { b.textContent = '▶'; });
  const activeRow = document.querySelector(`.row[data-id="${CSS.escape(item.id)}"]`);
  if (activeRow) {
    activeRow.classList.add('playing');
    const tog = activeRow.querySelector('.play-toggle');
    if (tog) tog.textContent = '⏸';
  }
}
function wirePreviewBar() {
  const audio = previewBar.audio();
  audio.addEventListener('pause', () => {
    if (!state.nowPlayingId) return;
    const row = document.querySelector(`.row[data-id="${CSS.escape(state.nowPlayingId)}"]`);
    if (row) {
      const tog = row.querySelector('.play-toggle');
      if (tog) tog.textContent = '▶';
    }
  });
  audio.addEventListener('play', () => {
    if (!state.nowPlayingId) return;
    const row = document.querySelector(`.row[data-id="${CSS.escape(state.nowPlayingId)}"]`);
    if (row) {
      const tog = row.querySelector('.play-toggle');
      if (tog) tog.textContent = '⏸';
    }
  });
  previewBar.cutter().onclick = () => {
    const item = state.nowPlayingId ? findById(state.nowPlayingId) : null;
    if (!item) return;
    const url = audioUrl(item);
    const params = new URLSearchParams({ src: url, title: item.title || '' });
    if (item.bpm) params.set('bpm', item.bpm);
    window.open('/cutter/?' + params.toString(), '_blank');
  };
  previewBar.copy().onclick = async () => {
    const item = state.nowPlayingId ? findById(state.nowPlayingId) : null;
    if (!item) return;
    await copyToClipboard(barePath(item));
  };
}

// ── Overflow menu: only one open at a time ─────────────────────
let openOverflowRow = null;
function closeOverflow() {
  if (openOverflowRow) {
    openOverflowRow.classList.remove('overflow-open');
    openOverflowRow = null;
  }
}
document.addEventListener('click', closeOverflow);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeOverflow(); });

// ── Render ─────────────────────────────────────────────────────
const CATEGORY_ORDER = ['transitions', 'stingers', 'risers', 'impacts', 'ambience', 'music'];

function render() { renderTabs(); renderContent(); renderTray(); }

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  const cats = [...state.byCat.keys()].sort((a, b) => {
    const ia = CATEGORY_ORDER.indexOf(a);
    const ib = CATEGORY_ORDER.indexOf(b);
    return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
  });
  for (const cat of cats) {
    const items = state.byCat.get(cat);
    const btn = document.createElement('button');
    btn.className = 'tab' + (cat === state.activeCat ? ' on' : '');
    const shortlisted = items.filter(i => i.shortlisted).length;
    btn.innerHTML = `${cat}<span class="count">${shortlisted}/${items.length}</span>`;
    btn.onclick = () => { state.activeCat = cat; render(); };
    tabs.appendChild(btn);
  }
}

function renderContent() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  if (!state.activeCat) { content.innerHTML = '<div class="empty">pick a category</div>'; return; }
  const all = state.byCat.get(state.activeCat) || [];
  const filtered = all.filter(matchesFilter);
  if (filtered.length === 0) { content.innerHTML = '<div class="empty">no matches — loosen filters</div>'; return; }
  // F8: list order stays put. Stars are bookmarks, not sort keys -- avoids
  // mid-flow surprise when starring re-orders adjacent items. Use the
  // SHOW shortlisted/unshortlisted chips to filter when needed.
  const sorted = [...filtered].sort((a, b) => durationSeconds(a.duration) - durationSeconds(b.duration));

  // Music: group by subcategory
  if (state.activeCat === 'music') {
    const groups = new Map();
    for (const it of sorted) {
      const sub = it.subcategory || 'unsorted';
      if (!groups.has(sub)) groups.set(sub, []);
      groups.get(sub).push(it);
    }
    let idx = 1;
    for (const [sub, items] of groups) {
      const h = document.createElement('div');
      h.className = 'sub-heading';
      h.textContent = `${sub} · ${items.length}`;
      content.appendChild(h);
      for (const it of items) content.appendChild(renderRow(it, idx++));
    }
    return;
  }
  sorted.forEach((it, i) => content.appendChild(renderRow(it, i + 1)));
}

function renderRow(item, idx) {
  const row = document.createElement('div');
  row.className = 'row' + (item.shortlisted ? ' shortlisted' : '') + (state.selection.has(item.id) ? ' selected' : '') + (state.nowPlayingId === item.id ? ' playing' : '');
  // Categorical stripe — Traktor pattern. Drives the 4px left-edge tint via CSS.
  row.dataset.category = item.category || '';
  row.dataset.id = item.id;

  const stripe = document.createElement('div');
  stripe.className = 'stripe';
  row.appendChild(stripe);

  const idxCell = document.createElement('div');
  idxCell.className = 'idx';
  idxCell.textContent = idx;
  row.appendChild(idxCell);

  const selBox = document.createElement('input');
  selBox.type = 'checkbox';
  selBox.className = 'sel';
  selBox.title = 'Add to selection tray';
  selBox.checked = state.selection.has(item.id);
  selBox.onchange = () => {
    if (selBox.checked) state.selection.add(item.id); else state.selection.delete(item.id);
    saveSelection(); renderTray();
    row.classList.toggle('selected', selBox.checked);
  };
  row.appendChild(selBox);

  const meta = document.createElement('div');
  meta.className = 'meta-cell';
  // F7: native browser tooltip surfaces the full title when ellipsis truncates.
  meta.innerHTML = `<div class="title" title="${esc(item.title || '')}">${esc(item.title || '—')}</div>
    <div class="sub">${esc(item.author || '—')} · ${esc((item.tags || []).slice(0, 3).join(', '))}</div>`;
  row.appendChild(meta);

  const playBtn = document.createElement('button');
  playBtn.className = 'play-toggle';
  playBtn.textContent = state.nowPlayingId === item.id ? '⏸' : '▶';
  playBtn.title = 'Audition (drives the preview bar)';
  playBtn.onclick = (e) => {
    e.stopPropagation();
    const audio = previewBar.audio();
    if (state.nowPlayingId === item.id) {
      // Same row — toggle play/pause without reloading.
      if (audio.paused) audio.play(); else audio.pause();
    } else {
      // Different row (or first play) — load + play.
      loadPreview(item);
      audio.play().catch(err => console.warn('autoplay blocked:', err));
    }
  };
  row.appendChild(playBtn);

  const dur = document.createElement('div');
  dur.className = 'duration';
  dur.textContent = item.duration || '—';
  row.appendChild(dur);

  const bpm = document.createElement('div');
  bpm.className = 'bpm' + (item.bpm == null ? ' null' : '');
  bpm.textContent = item.bpm == null ? '—' : item.bpm;
  bpm.title = item.bpm == null ? 'no BPM detected' : `${item.bpm} BPM`;
  row.appendChild(bpm);

  const starBtn = document.createElement('button');
  starBtn.className = 'act star' + (item.shortlisted ? ' on' : '');
  starBtn.textContent = '⭐';
  starBtn.title = 'Toggle shortlist';
  starBtn.onclick = () => {
    const next = !item.shortlisted;
    scheduleSave(item, { shortlisted: next });
    render();
  };
  row.appendChild(starBtn);

  const overflowBtn = document.createElement('button');
  overflowBtn.className = 'act overflow';
  overflowBtn.textContent = '…';
  overflowBtn.title = 'More actions';
  overflowBtn.setAttribute('aria-haspopup', 'menu');
  overflowBtn.onclick = (e) => {
    e.stopPropagation();
    const wasOpen = row.classList.contains('overflow-open');
    closeOverflow();
    if (!wasOpen) {
      row.classList.add('overflow-open');
      openOverflowRow = row;
    }
  };
  row.appendChild(overflowBtn);

  const menu = document.createElement('div');
  menu.className = 'overflow-menu';
  menu.setAttribute('role', 'menu');
  menu.onclick = (e) => e.stopPropagation();
  menu.innerHTML = `
    <button data-action="cutter">✂︎ Open in Loop Cutter<div class="menu-sub">new tab · prefills BPM if known</div></button>
    <button data-action="copy">📋 Copy path<div class="menu-sub">${esc(barePath(item))}</div></button>
    <button data-action="copy-wrapped">📋 Copy staticFile() wrapper</button>
  `;
  menu.querySelectorAll('button').forEach(btn => {
    btn.onclick = async (e) => {
      e.stopPropagation();
      const action = btn.dataset.action;
      if (action === 'cutter') {
        const url = audioUrl(item);
        if (url) {
          const params = new URLSearchParams({ src: url, title: item.title || '' });
          if (item.bpm) params.set('bpm', item.bpm);
          window.open('/cutter/?' + params.toString(), '_blank');
        }
      } else if (action === 'copy') {
        await copyToClipboard(barePath(item));
      } else if (action === 'copy-wrapped') {
        await copyToClipboard(wrappedPath(item));
      }
      closeOverflow();
    };
  });
  row.appendChild(menu);

  const noteDiv = document.createElement('div');
  noteDiv.className = 'note';
  const noteInput = document.createElement('input');
  noteInput.type = 'text';
  noteInput.placeholder = 'notes (optional)…';
  noteInput.value = item.notes || '';
  noteInput.oninput = () => scheduleSave(item, { notes: noteInput.value });
  noteDiv.appendChild(noteInput);
  row.appendChild(noteDiv);

  return row;
}

// ── Tray ───────────────────────────────────────────────────────
function findById(id) {
  for (const items of state.byCat.values()) {
    const it = items.find(i => i.id === id);
    if (it) return it;
  }
  return null;
}
function renderTray() {
  const tray = document.getElementById('tray');
  const count = state.selection.size;
  document.getElementById('trayCount').textContent = count;
  const label = document.getElementById('trayLabel');
  tray.classList.toggle('empty', count === 0);
  label.textContent = count === 0
    ? 'nothing selected — tick boxes to stage for copy'
    : `${count} item${count === 1 ? '' : 's'} staged`;
  document.getElementById('trayClear').disabled = count === 0;
  document.getElementById('trayCopy').disabled = count === 0;
  document.getElementById('trayPromote').disabled = count === 0;
}
document.getElementById('trayClear').onclick = () => {
  state.selection.clear(); saveSelection(); render();
};
document.getElementById('trayCopy').onclick = async () => {
  const lines = [];
  for (const id of state.selection) {
    const it = findById(id);
    if (!it) continue;
    const dur = it.duration ? `, ${it.duration}` : '';
    const note = it.notes ? ` — ${it.notes}` : '';
    lines.push(`- \`${barePath(it)}\`${note}${dur}`);
  }
  await copyToClipboard(lines.join('\n') + '\n');
  const btn = document.getElementById('trayCopy');
  btn.textContent = 'Copied ✓';
  setTimeout(() => { btn.textContent = 'Copy selection'; }, 1200);
};
document.getElementById('trayPromote').onclick = async () => {
  const ids = [...state.selection];
  setIndicator('saving');
  try {
    for (const id of ids) {
      const it = findById(id);
      if (!it || it.shortlisted) continue;
      const res = await fetch(`/api/item/${encodeURIComponent(id)}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ shortlisted: true }),
      });
      if (!res.ok) throw new Error('PATCH ' + res.status);
      const out = await res.json();
      Object.assign(it, out.item);
    }
    setIndicator('saved');
    state.selection.clear();
    saveSelection();
    render();
  } catch (e) {
    console.error(e); setIndicator('error: ' + e.message, true);
  }
};

// ── Filter wires ───────────────────────────────────────────────
document.querySelectorAll('.chip[data-status]').forEach(el => {
  el.onclick = () => {
    document.querySelectorAll('.chip[data-status]').forEach(x => x.classList.remove('on'));
    el.classList.add('on');
    state.filter.status = el.dataset.status; render();
  };
});
document.querySelectorAll('.chip[data-dur]').forEach(el => {
  el.onclick = () => {
    document.querySelectorAll('.chip[data-dur]').forEach(x => x.classList.remove('on'));
    el.classList.add('on');
    state.filter.dur = el.dataset.dur; render();
  };
});
document.getElementById('search').oninput = (e) => {
  state.filter.search = e.target.value; render();
};

// ── Boot ───────────────────────────────────────────────────────
async function boot() {
  wirePreviewBar();
  const res = await fetch('/api/manifest');
  const data = await res.json();
  state.manifest = data;
  state.byCat = new Map();
  for (const item of data.items || []) {
    const c = item.category || 'uncategorised';
    if (!state.byCat.has(c)) state.byCat.set(c, []);
    state.byCat.get(c).push(item);
  }
  // Prune selection of ids no longer in manifest.
  const allIds = new Set(data.items.map(i => i.id));
  for (const id of state.selection) if (!allIds.has(id)) state.selection.delete(id);
  saveSelection();

  const total = data.items.length;
  const shortlisted = data.items.filter(i => i.shortlisted).length;
  document.getElementById('meta').textContent =
    `${total} files · ${shortlisted} shortlisted · ${state.byCat.size} categories · schema v${data.schema_version ?? 1}`;
  // Default tab: first in CATEGORY_ORDER that exists.
  state.activeCat = CATEGORY_ORDER.find(c => state.byCat.has(c)) || state.byCat.keys().next().value;
  render();
}
boot().catch(e => {
  document.getElementById('content').innerHTML = `<div class="empty">failed to load manifest: ${esc(e.message)}</div>`;
});
</script>
</body>
